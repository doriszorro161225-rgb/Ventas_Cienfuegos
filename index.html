<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Tienda</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e6f5c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --ink:#1c2b24;
    --paper:#f6f1e4;
    --line:#cdbf9d;
    --accent:#c0392b;
    --accent-2:#1e6f5c;
    --field-bg:#fffdf8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:"Courier New", ui-monospace, monospace;
    min-height:100vh;
  }
  .wrap{ max-width:880px; margin:0 auto; padding:20px 16px 60px; }
  header{ border-bottom:2px dashed var(--line); padding-bottom:16px; margin-bottom:20px; }
  .header-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .kicker{ font-size:12px; letter-spacing:.18em; color:var(--accent); font-weight:700; }
  h1{ font-family:Georgia, serif; font-size:26px; margin:4px 0 6px; text-transform:uppercase; letter-spacing:.02em; }
  .subtitulo{ font-size:13px; color:#6b6354; margin:0; }
  .admin-link{
    border:1.5px dashed var(--line); background:transparent; color:var(--ink);
    width:36px; height:36px; border-radius:4px; cursor:pointer; display:flex;
    align-items:center; justify-content:center; flex-shrink:0; text-decoration:none; font-size:16px;
  }
  .estado{ text-align:center; padding:40px 0; color:#8a8169; font-size:13px; }
  .vacio{ text-align:center; padding:50px 20px; color:#9a8f72; }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));
    gap:14px;
  }
  .card{
    background:var(--field-bg); border:1px solid var(--line); border-radius:4px;
    overflow:hidden; cursor:pointer; display:flex; flex-direction:column;
    box-shadow:0 4px 14px -10px rgba(28,43,36,0.4);
  }
  .card-img-wrap{ width:100%; aspect-ratio:1/1; background:#eee5cf; overflow:hidden; }
  .card-img-wrap img{ width:100%; height:100%; object-fit:cover; display:block; }
  .card-img-placeholder{ width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:#eee5cf; font-size:28px; opacity:.3; }
  .card-body{ padding:10px; display:flex; flex-direction:column; gap:6px; flex:1; }
  .card-nombre{ font-size:13.5px; font-family:Georgia, serif; margin:0; line-height:1.3; }
  .card-precio{ font-size:13px; color:var(--accent-2); font-weight:700; }
  .card-pedir-btn{
    margin-top:auto; background:var(--accent-2); color:#fefcf4; border:none;
    padding:8px 10px; border-radius:3px; font-size:12px; font-weight:700;
    cursor:pointer; font-family:inherit;
  }

  .overlay{
    position:fixed; inset:0; background:rgba(28,43,36,0.55);
    display:none; align-items:center; justify-content:center; padding:16px; z-index:50;
  }
  .overlay.open{ display:flex; }
  .modal{
    background:var(--field-bg); max-width:420px; width:100%; max-height:88vh;
    overflow-y:auto; border-radius:6px; position:relative; border:1px solid var(--line);
  }
  .modal-cerrar{
    position:absolute; top:10px; right:10px; background:rgba(28,43,36,0.65);
    color:#fff; border:none; width:32px; height:32px; border-radius:50%;
    cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:2; font-size:16px;
  }
  .modal img{ width:100%; max-height:280px; object-fit:cover; display:block; }
  .modal-body{ padding:18px; }
  .modal-nombre{ font-family:Georgia, serif; font-size:21px; margin:0 0 6px; }
  .modal-precio{ font-size:16px; color:var(--accent-2); font-weight:700; margin-bottom:10px; }
  .modal-descripcion{ font-size:13.5px; line-height:1.6; color:#3d4a42; margin-bottom:18px; white-space:pre-wrap; }
  .modal-pedir-btn{
    width:100%; background:var(--accent-2); color:#fefcf4; border:none;
    padding:13px; border-radius:4px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit;
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="header-top">
      <div>
        <div class="kicker">CATÁLOGO</div>
        <h1>Lo que tengo a la venta</h1>
      </div>
      <a href="admin.html" class="admin-link" aria-label="Administrar">🔒</a>
    </div>
    <p class="subtitulo">Toca un producto para ver los detalles y pedirlo por WhatsApp.</p>
  </header>

  <div id="estado" class="estado">Cargando productos…</div>
  <div id="vacio" class="vacio" style="display:none;">Todavía no hay productos publicados.</div>
  <div id="grid" class="grid"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <button class="modal-cerrar" id="modalCerrar">✕</button>
    <div id="modalImgWrap"></div>
    <div class="modal-body">
      <h2 class="modal-nombre" id="modalNombre"></h2>
      <div class="modal-precio" id="modalPrecio"></div>
      <p class="modal-descripcion" id="modalDescripcion"></p>
      <button class="modal-pedir-btn" id="modalPedirBtn">Pedir por WhatsApp</button>
    </div>
  </div>
</div>

<script>
const WHATSAPP_NUMBER = "5354571729";

function isMobileDevice() {
  return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

function buildWhatsappUrl(message) {
  const encoded = encodeURIComponent(message);
  if (isMobileDevice()) {
    return `whatsapp://send?phone=${WHATSAPP_NUMBER}&text=${encoded}`;
  }
  return `https://web.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encoded}`;
}

function openWhatsapp(message) {
  const url = buildWhatsappUrl(message);
  if (isMobileDevice()) {
    const fallback = `https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodeURIComponent(message)}`;
    const timer = setTimeout(() => { window.location.href = fallback; }, 1500);
    window.addEventListener("blur", () => clearTimeout(timer), { once: true });
    window.location.href = url;
  } else {
    window.open(url, "_blank");
  }
}

function formatPrice(precio, moneda) {
  if (precio === "" || precio === null || precio === undefined) return "";
  return `${precio} ${moneda || ""}`.trim();
}

function pedirProducto(producto) {
  const partes = ["🛍️ PEDIDO DE PRODUCTO", "", `📦 Producto: ${producto.nombre}`];
  if (producto.precio) partes.push(`💵 Precio: ${formatPrice(producto.precio, producto.moneda)}`);
  if (producto.descripcion) partes.push(`📝 Descripción: ${producto.descripcion}`);
  partes.push("", "Hola, me interesa este producto. ¿Está disponible?");
  openWhatsapp(partes.join("\n"));
}

let productosData = [];

function abrirModal(producto) {
  document.getElementById("modalNombre").textContent = producto.nombre;
  document.getElementById("modalPrecio").textContent = formatPrice(producto.precio, producto.moneda);
  document.getElementById("modalDescripcion").textContent = producto.descripcion || "";
  const imgWrap = document.getElementById("modalImgWrap");
  imgWrap.innerHTML = producto.imagen
    ? `<img src="${producto.imagen}" alt="${producto.nombre}">`
    : `<div class="card-img-placeholder" style="height:220px;">🖼️</div>`;
  document.getElementById("modalPedirBtn").onclick = () => pedirProducto(producto);
  document.getElementById("overlay").classList.add("open");
}

document.getElementById("modalCerrar").addEventListener("click", () => {
  document.getElementById("overlay").classList.remove("open");
});
document.getElementById("overlay").addEventListener("click", (e) => {
  if (e.target.id === "overlay") document.getElementById("overlay").classList.remove("open");
});

function renderProductos(productos) {
  const grid = document.getElementById("grid");
  const estado = document.getElementById("estado");
  const vacio = document.getElementById("vacio");
  estado.style.display = "none";

  if (!productos.length) {
    vacio.style.display = "block";
    return;
  }
  vacio.style.display = "none";

  grid.innerHTML = productos.map((p, i) => `
    <article class="card" data-idx="${i}">
      <div class="card-img-wrap">
        ${p.imagen ? `<img src="${p.imagen}" alt="${p.nombre}">` : `<div class="card-img-placeholder">🖼️</div>`}
      </div>
      <div class="card-body">
        <h3 class="card-nombre">${p.nombre}</h3>
        ${p.precio ? `<div class="card-precio">${formatPrice(p.precio, p.moneda)}</div>` : ""}
        <button class="card-pedir-btn" data-idx="${i}" data-action="pedir">Pedir</button>
      </div>
    </article>
  `).join("");

  grid.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", (e) => {
      if (e.target.dataset.action === "pedir") return;
      abrirModal(productos[card.dataset.idx]);
    });
  });
  grid.querySelectorAll("[data-action='pedir']").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      pedirProducto(productos[btn.dataset.idx]);
    });
  });
}

fetch("productos.json?_=" + Date.now())
  .then(res => res.json())
  .then(data => {
    productosData = Array.isArray(data) ? data : [];
    renderProductos(productosData);
  })
  .catch(() => {
    document.getElementById("estado").textContent = "No se pudieron cargar los productos.";
  });

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>

</body>
</html>
